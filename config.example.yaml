# ============================================================
# kadong_cards_crawler - 卡动文创卡牌图片爬虫 配置文件
# ============================================================
# 使用方法：复制为 config.yaml 即可，脚本会自动读取同目录下的 config.yaml
#   cp config.example.yaml config.yaml
#   python kadong_cards_crawler.py            # 自动加载 config.yaml（最常用）
# 仅当配置文件改名或不在当前目录时，才用 --yaml 显式指定：
#   python kadong_cards_crawler.py --yaml /path/to/other_config.yaml
# 命令行参数（如 --ip、-o 等）优先级高于本配置文件。
# ============================================================

# ---------- API 配置 ----------
api:
  # IceSnowHelp API 基础地址
  base_url: "https://kadongcc.com/ashx/IceSnowHelp.ashx"
  # 请求超时时间（秒）
  timeout: 30

# ---------- 请求头配置 ----------
headers:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  referer: "https://kadongcc.com/"

# ---------- 下载配置 ----------
download:
  # 输出根目录
  output_dir: "output/kadong_cards"
  # 并发下载线程数（建议 5~10）
  concurrency: 5
  # 图片请求超时（秒）
  image_timeout: 60
  # 跳过的图片扩展名（已下载的文件自动跳过）
  skip_existing: true

# ---------- 筛选配置（默认全部下载）----------
filters:
  # 指定 IP 名称，逗号分隔。留空表示下载全部
  # 可用 IP 可通过 --list-ip 查看
  ip: ""
  # 指定系列名称，逗号分隔。留空表示下载全部
  series: ""

# ---------- CSV 导出配置 ----------
csv:
  # 导出「文件」路径：必须是完整路径 + 文件名，例如 output/kadong_cards.csv 或 D:/data/my_list.csv
  # ⚠️ 这里填的是「文件路径」不是「目录」！只填目录（如 output/data 或 output/data/）
  #    会报错（Windows 下 open() 把目录当文件打开 → PermissionError）或生成无 .csv 后缀的错文件
  # 留空则自动输出到 output 目录下（文件名固定为 kadong_cards.csv）
  path: ""
  # CSV 编码
  encoding: "utf-8-sig"
